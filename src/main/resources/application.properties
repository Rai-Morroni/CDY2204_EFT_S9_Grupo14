spring.application.name=guia-despacho-backend
server.port=8080

# =========================================================================
# Azure AD B2C (IDaaS) - JWT Resource Server
# =========================================================================
# El issuer se obtiene ejecutando el "User Flow" creado en la Semana 4 y
# leyendo el campo "iss" en https://jwt.ms (ver Guia S5, Paso 4 y 5).
# Formato: https://login.microsoftonline.com/<tenant-id>/v2.0
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_AD_B2C_ISSUER_URI:https://inscripcionesduocgrupo14.b2clogin.com/tfp/16685c4e-e1cd-4f1f-b2b6-9cbacf2daa94/b2c_1_signupsignin/v2.0/}

# =========================================================================
# AWS S3 - almacenamiento de PDFs y metadata de las guias (sin BD)
# =========================================================================
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.region=${AWS_REGION:us-east-1}

# AWS Academy entrega credenciales temporales: deben refrescarse cada vez
# que se reinicia el laboratorio (igual que en GitHub Actions Secrets,
# segun la guia de la semana 5, "Integrando el API Manager...", Paso 1).
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_ACCESS_KEY}
aws.sessionToken=${AWS_SESSION_TOKEN:}

# Tamano maximo de archivos subidos (PDFs generados son livianos, pero se deja margen)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logs utiles para verificar en consola que Spring Security esta validando el JWT.
logging.level.org.springframework.security=INFO

# =========================================================================
# RabbitMQ
# =========================================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin123}

# Nombres de colas y exchanges (constantes usadas en el codigo)
rabbitmq.exchange=guias-exchange
rabbitmq.queue.tickets=guias-queue
rabbitmq.queue.dlq=guias-dlq
rabbitmq.routing-key.tickets=guias.tickets
rabbitmq.routing-key.dlq=guias.error

# =========================================================================
# Oracle Cloud (Autonomous Database via Wallet)
# =========================================================================
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@hubn6tnhk6rn8nte_high?TNS_ADMIN=/app/Wallet_MI-BD}
spring.datasource.username=${ORACLE_USER:ADMIN}
spring.datasource.password=${ORACLE_PASS:OracleCloud1234}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Si el consumidor falla, rechaza el mensaje (no reencola)
# y lo envia automaticamente a la DLQ via el Dead Letter Exchange
spring.rabbitmq.listener.simple.default-requeue-rejected=false